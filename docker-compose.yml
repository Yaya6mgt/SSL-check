services:
  db:
    image: mysql:8.0
    container_name: ssl-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$DB_USER", "-p$$DB_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10

  ssl-monitor:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: ssl-monitor-app
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    restart: on-failure
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    volumes:
        - ./backend:/app
        - /app/node_modules
        - ./data:/app/data
        - ./uploads:/app/uploads
    command: npm run dev
    ports:
      - "3000:3000"

  ssl-monitor-prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: ssl-monitor-app-prod
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped
    volumes:
        - ./data:/app/data
        - ./uploads:/app/uploads
    command: npm start
    ports:
      - "3001:3000"
    profiles:
      - prod

  ssl-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    container_name: ssl-frontend
    ports:
      - "8080:80"
    depends_on:
      - ssl-monitor
    restart: always

volumes:
  db_data: