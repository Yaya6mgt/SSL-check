services:
  db:
    image: mysql:8.0
    container_name: ssl-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$DB_USER", "-p$$DB_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10

  ssl-monitor:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: build
    container_name: ssl-monitor-app
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    restart: on-failure
    volumes:
        - ./backend:/app
        - /app/node_modules
        - ./data:/app/data
    command: npm run dev
    ports:
      - "3000:3000"

  ssl-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ssl-frontend
    ports:
      - "8080:80"
    depends_on:
      - ssl-monitor
    restart: always

volumes:
  db_data: